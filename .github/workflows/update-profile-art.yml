name: Update profile art

on:
  schedule:
    # once a day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape latest contribution data (public, no auth needed)
        env:
          GH_PROFILE_USER: ${{ github.repository_owner }}
        run: python3 scripts/fetch_contributions.py

      - name: Render updated heatmap SVG
        run: python3 scripts/render_heatmap.py

      - name: Commit changes if anything updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json assets/contrib-heatmap.svg
          git diff --staged --quiet || git commit -m "chore: refresh contribution heatmap"
          git push
